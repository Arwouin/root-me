<script>
  function log(msg) {

    console.log('[BFCache]', msg);
  }

  window.addEventListener('load', () => {
    log('load');


    history.pushState({step: 1}, '', 'step1');
    history.pushState({step: 2}, '', 'step2');

   
    setTimeout(() => {
      log('go to /flag');
      location.href = 'http://challenge01.root-me.org:58007/flag';
    }, 2000);
  });

 
  window.addEventListener('pageshow', (event) => {
    log('pageshow, persisted=' + event.persisted);

  
    setTimeout(() => {
      log('history.back()');
      history.back();
    }, 2000);
  });
</script>
