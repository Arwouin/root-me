<!DOCTYPE html>
<html>
<body>
<script>
// Faire une requête vers l'endpoint interne
fetch('http://127.0.0.1:5000/flag')
  .then(response => response.text())
  .then(data => {
    document.body.innerHTML = '<pre>' + data + '</pre>';
  })
  .catch(err => {
    document.body.innerHTML = 'Erreur: ' + err;
  });
</script>
</body>
</html>
